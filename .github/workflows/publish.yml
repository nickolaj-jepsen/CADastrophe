# On every push to main: rebuild all STL/3MF, replace the rolling "latest"
# release (stable download URLs: releases/download/latest/<file>), and deploy
# the gallery site to GitHub Pages.
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: write # rolling release + tag
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Geometry gate (never publish a non-manifold model)
        run: nix flake check -L

      - name: Build release artifacts
        run: nix build -L # result/ = STL + 3MF for every project

      # Delete/recreate (rather than upload-over) so assets of renamed or
      # removed projects don't linger. The seconds-long 404 window and a few
      # minutes of CDN staleness are acceptable here.
      - name: Update rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest result/* \
            --title "Latest builds ($(date -u +%F))" \
            --notes "STL/3MF for every project, auto-built from ${GITHUB_SHA}. Download URLs under releases/download/latest/ are stable."

      - name: Build gallery site
        env:
          SCAD_REPO: ${{ github.repository }}
          LIBGL_ALWAYS_SOFTWARE: "1" # runners have no GPU; force Mesa llvmpipe
        run: nix develop --command scad site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
