<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680">
  <defs>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#6aa84f" stroke-width="1.6"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffb347"/>
    </marker>
  </defs>
  <style>
    text { font-family: sans-serif; fill: #d3d3d3; font-size: 13px; }
    .small { font-size: 11px; fill: #9aa5a8; }
    .num   { font-size: 13px; font-weight: bold; fill: #121212; }
    .dim   { stroke: #ffb347; stroke-width: 1.5; marker-start: url(#arr); marker-end: url(#arr); }
    .lead  { stroke: #ffb347; stroke-width: 1; fill: none; }
    .rear  { fill: none; stroke: #e06666; stroke-width: 1.6; stroke-dasharray: 5 4; }
    .band  { fill: url(#hatch); stroke: #6aa84f; stroke-width: 0.8; }
  </style>

  <rect width="1000" height="680" fill="#121212"/>
  <text x="20" y="26" font-size="17" font-weight="bold">uniflag — caliper these 5 things before printing</text>
  <text x="20" y="44" class="small">front view of the Cosmic Unicorn, origin bottom-left · solid = front side · red dashed = parts on the REAR · green hatch = where the mount's rear lips touch the back</text>

  <!-- ============ board, front view: 1 mm = 2.2 px, origin (120, 488.8) ============ -->
  <rect x="120" y="60" width="448.8" height="448.8" rx="7" fill="#2b3a42" stroke="#7a8a90" stroke-width="2"/>
  <!-- LED field -->
  <rect x="133.2" y="73.2" width="422.4" height="422.4" fill="#16281e" stroke="#37503f" stroke-width="1"/>
  <text x="344" y="290" text-anchor="middle" fill="#37503f" font-size="15">32 × 32 LED matrix</text>

  <!-- mounting holes (M2, exact) -->
  <g fill="#121212" stroke="#7a8a90">
    <circle cx="126.6" cy="502.2" r="3"/><circle cx="344.4" cy="502.2" r="3"/><circle cx="562.2" cy="502.2" r="3"/>
    <circle cx="126.6" cy="284.4" r="3"/><circle cx="562.2" cy="284.4" r="3"/>
    <circle cx="126.6" cy="66.6" r="3"/><circle cx="562.2" cy="66.6" r="3"/>
  </g>
  <!-- hanging slot, speaker grille -->
  <rect x="326.8" y="65.7" width="35.2" height="6.6" rx="3" fill="#121212" stroke="#7a8a90"/>
  <rect x="414.8" y="416.4" width="39.6" height="26.4" rx="3" fill="none" stroke="#7a8a90" stroke-dasharray="2 2"/>
  <text x="458" y="433" class="small">speaker grille</text>

  <!-- rear lip contact bands (green hatch) -->
  <rect class="band" x="133.2" y="60"    width="422.4" height="8.8"/>
  <rect class="band" x="120"   y="73.2"  width="8.8"   height="233.2"/>
  <rect class="band" x="560"   y="73.2"  width="8.8"   height="264"/>
  <rect class="band" x="366.4" y="500"   width="189.2" height="8.8"/>

  <!-- rear-side components (dashed red, front-view coords) -->
  <rect class="rear" x="122.2" y="442.8" width="114.4" height="57.2"/>
  <text x="146" y="438" class="small" fill="#e06666">Pico (rear)</text>
  <rect class="rear" x="315.8" y="453.8" width="38.5" height="13.2"/>
  <text x="306" y="450" class="small" fill="#e06666">Qw/ST</text>
  <circle class="rear" cx="286.1" cy="495.6" r="4"/>
  <text x="268" y="486" class="small" fill="#e06666">RESET</text>
  <rect class="rear" x="370.8" y="463" width="22" height="13"/>
  <text x="372" y="459" class="small" fill="#e06666">JST</text>

  <!-- edge buttons (front view) -->
  <g fill="#5b6e75">
    <rect x="112" y="327" width="8" height="8"/><rect x="112" y="353.4" width="8" height="8"/>
    <rect x="112" y="379.9" width="8" height="8"/><rect x="112" y="406.7" width="8" height="8"/>
    <rect x="568.8" y="352.3" width="8" height="8"/><rect x="568.8" y="378.5" width="8" height="8"/>
    <rect x="568.8" y="423.4" width="8" height="8"/><rect x="568.8" y="458.4" width="8" height="8"/>
    <rect x="568.8" y="484.6" width="8" height="8"/>
  </g>
  <text x="84" y="336" class="small">A</text><text x="84" y="362" class="small">B</text>
  <text x="84" y="388" class="small">C</text><text x="84" y="415" class="small">D</text>
  <text x="582" y="361" class="small">Vol+</text><text x="582" y="387" class="small">Vol−</text>
  <text x="582" y="432" class="small">Zzz</text><text x="582" y="467" class="small">Lux+</text>
  <text x="582" y="493" class="small">Lux−</text>

  <!-- USB plug boot (sticks out the LEFT edge, from the rear Pico) -->
  <rect x="80" y="463.7" width="40" height="15.4" rx="3" fill="#4a4a4a" stroke="#8a8a8a"/>
  <path d="M80,471.4 C 60,471.4 52,490 52,510" fill="none" stroke="#8a8a8a" stroke-width="3"/>

  <!-- (1a) port centre height above the bottom edge -->
  <line class="dim" x1="98" y1="508.8" x2="98" y2="471.4"/>
  <line class="lead" x1="92" y1="508.8" x2="120" y2="508.8" stroke-dasharray="3 3"/>
  <circle cx="98" cy="530" r="10" fill="#ffb347"/><text x="98" y="534.5" class="num" text-anchor="middle">1a</text>
  <!-- (1b) boot length past the edge -->
  <line class="dim" x1="80" y1="452" x2="120" y2="452"/>
  <circle cx="66" cy="452" r="10" fill="#ffb347"/><text x="66" y="456.5" class="num" text-anchor="middle">1b</text>

  <!-- (3) button stick-out, leader to D -->
  <circle cx="84" cy="300" r="10" fill="#ffb347"/><text x="84" y="304.5" class="num" text-anchor="middle">3</text>
  <path class="lead" d="M91,307 L112,329"/>

  <!-- (4) rear boxes + bands -->
  <circle cx="240" cy="530" r="10" fill="#ffb347"/><text x="240" y="534.5" class="num" text-anchor="middle">4</text>
  <path class="lead" d="M240,520 L240,498"/>
  <path class="lead" d="M250,527 L370,505"/>

  <!-- (2) edge stack, leader from the top band to the section inset -->
  <circle cx="582" cy="80" r="10" fill="#ffb347"/><text x="582" y="84.5" class="num" text-anchor="middle">2</text>
  <path class="lead" d="M572,80 L500,66"/>

  <!-- (5) light sensor somewhere on the right front border -->
  <rect x="555.6" y="79.8" width="6" height="407" fill="#b86200" opacity="0.55"/>
  <circle cx="582" cy="130" r="10" fill="#ffb347"/><text x="582" y="134.5" class="num" text-anchor="middle">5</text>
  <path class="lead" d="M573,135 L562,160"/>

  <!-- ============ inset: (2) edge-stack section ============ -->
  <text x="640" y="70" font-weight="bold">2 — edge stack (section through any lipped edge)</text>
  <rect x="660" y="100" width="200" height="24" fill="#2e6b6b"/>
  <text x="868" y="117" class="small">ring lip (printed)</text>
  <rect x="660" y="126.8" width="200" height="12.8" fill="#3f7a4d"/>
  <text x="868" y="138" class="small">board border</text>
  <rect x="660" y="139.6" width="200" height="24" fill="#2e6b6b"/>
  <text x="868" y="156" class="small">frame lip (printed)</text>
  <line class="dim" x1="645" y1="126.8" x2="645" y2="139.6"/>
  <text x="638" y="137" class="small" text-anchor="end">measure ↦</text>
  <text x="640" y="186" class="small">model assumes bare 1.6 PCB in the outer 5 mm border;</text>
  <text x="640" y="200" class="small">channel is cut 1.95 tall (chan_slack 0.35). caliper the real</text>
  <text x="640" y="214" class="small">border thickness — incl. any film/solder/parts you find.</text>

  <!-- ============ inset: (3) button stick-out ============ -->
  <text x="640" y="252" font-weight="bold">3 — button stick-out past the PCB edge</text>
  <rect x="760" y="270" width="100" height="46" fill="#3f7a4d"/>
  <text x="800" y="298" class="num" fill="#121212">PCB</text>
  <rect x="762" y="280" width="36" height="26" fill="#5b6e75"/>
  <rect x="746" y="286" width="16" height="14" fill="#8a8a8a"/>
  <line class="dim" x1="746" y1="324" x2="760" y2="324"/>
  <line class="lead" x1="760" y1="270" x2="760" y2="330" stroke-dasharray="3 3"/>
  <text x="640" y="328" class="small">model guesses ~1.5</text>

  <!-- ============ the list ============ -->
  <g>
    <text x="640" y="372" font-weight="bold">what each number feeds:</text>
    <text x="640" y="396"><tspan fill="#ffb347" font-weight="bold">1a/1b</tspan>  USB port centre height + boot length</text>
    <text x="668" y="412" class="small">with YOUR cable → usb_y=[9,25] window, plug_len=27, gap=40</text>
    <text x="640" y="436"><tspan fill="#ffb347" font-weight="bold">2</tspan>  board thickness at the border → chan_slack=0.35</text>
    <text x="640" y="460"><tspan fill="#ffb347" font-weight="bold">3</tspan>  button stick-out → bd_clr=0.4 wall gap</text>
    <text x="640" y="484"><tspan fill="#ffb347" font-weight="bold">4</tspan>  rear parts: red boxes right to ±3 mm? green bands</text>
    <text x="668" y="500" class="small">flat &amp; empty? → keepl_y/keepr_y/keepb_x lip segments</text>
    <text x="640" y="524"><tspan fill="#ffb347" font-weight="bold">5</tspan>  light sensor height on the right edge <tspan class="small">(orange strip)</tspan></text>
    <text x="668" y="540" class="small">→ nothing yet: the right edge stays fully open. note it</text>
    <text x="668" y="554" class="small">down anyway in case the design ever grows a right lip.</text>
  </g>

  <!-- legend -->
  <g>
    <rect x="120" y="560" width="22" height="12" class="band"/>
    <text x="150" y="570" class="small">rear lips touch the board's back here — must be flat, empty PCB</text>
    <rect x="120" y="582" width="22" height="12" class="rear"/>
    <text x="150" y="592" class="small">rear-side components (positions photo-derived, ±3 mm — confirm)</text>
    <rect x="120" y="604" width="22" height="12" fill="#b86200" opacity="0.55"/>
    <text x="150" y="614" class="small">light-sensor search zone (x ≈ 198–202, height unknown)</text>
    <line x1="120" y1="632" x2="142" y2="632" class="dim"/>
    <text x="150" y="636" class="small">caliper measurement · all coords mm from the board's front-view bottom-left corner</text>
  </g>
</svg>
